<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF → 长图 PNG 转换器</title>
  <script src="../cdn/pdfjs/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .topbar {
      width: 100%;
      max-width: 560px;
      margin-bottom: 18px;
    }

    .back-link {
      color: #8d8d8d;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover { color: #fff; }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 36px;
      text-align: center;
      line-height: 1.6;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #555;
      background: #222;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      display: block;
    }

    .drop-label {
      font-size: 0.95rem;
      color: #aaa;
    }

    .drop-label strong { color: #fff; }

    .drop-hint {
      font-size: 0.75rem;
      color: #555;
      margin-top: 6px;
      line-height: 1.6;
    }

    .options {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.78rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select,
    input[type="range"] {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.9rem;
      padding: 8px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:hover, select:focus {
      border-color: #444;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      padding: 0;
      flex: 1;
      height: 4px;
      accent-color: #fff;
      border: none;
      background: transparent;
    }

    .range-val {
      font-size: 0.85rem;
      color: #ccc;
      min-width: 36px;
      text-align: right;
    }

    .btn {
      margin-top: 24px;
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn:hover { background: #e8e8e8; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .progress-wrap {
      margin-top: 20px;
      display: none;
    }

    .progress-bar-bg {
      background: #222;
      border-radius: 999px;
      height: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #fff;
      border-radius: 999px;
      transition: width 0.2s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 0.8rem;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }

    .result {
      margin-top: 20px;
      display: none;
    }

    .result-info {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .result-info-text {
      font-size: 0.85rem;
      color: #aaa;
      min-width: 0;
    }

    .result-info-text strong {
      display: block;
      color: #fff;
      font-size: 0.9rem;
      margin-bottom: 2px;
      word-break: break-all;
    }

    .download-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: #252525;
      border-color: #555;
    }

    .preview-toggle {
      background: none;
      border: none;
      color: #555;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
      text-align: center;
      padding: 4px;
      transition: color 0.2s;
    }

    .preview-toggle:hover { color: #888; }

    .preview-img-wrap {
      margin-top: 10px;
      border-radius: 8px;
      overflow: hidden;
      max-height: 400px;
      overflow-y: auto;
      display: none;
      border: 1px solid #2a2a2a;
    }

    .preview-img-wrap img {
      width: 100%;
      display: block;
    }

    .error-msg {
      margin-top: 16px;
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #ff6b6b;
      display: none;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .options {
        grid-template-columns: 1fr;
      }

      .result-info {
        flex-direction: column;
        align-items: stretch;
      }

      .download-btn {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back-link" href="../Index.html">← 返回工具入口</a>
  </div>

  <h1>PDF → 长图 PNG</h1>
  <p class="subtitle">仅支持单个 PDF，按页顺序渲染并拼接为一张长图</p>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" />
      <span class="drop-icon">📄</span>
      <div class="drop-label"><strong>点击选择</strong> 或拖拽 PDF 文件到此处</div>
      <div class="drop-hint">仅支持单个 PDF · 纯本地处理，不上传任何文件</div>
    </div>

    <div class="options">
      <div class="option-group">
        <label>渲染缩放比例</label>
        <div class="range-row">
          <input type="range" id="scaleRange" min="1" max="4" step="0.5" value="2" />
          <span class="range-val" id="scaleVal">×2</span>
        </div>
      </div>

      <div class="option-group">
        <label>输出格式</label>
        <select id="formatSelect">
          <option value="image/png" selected>PNG（无损）</option>
          <option value="image/jpeg">JPEG（更小）</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>

      <div class="option-group">
        <label>页面间距（px）</label>
        <div class="range-row">
          <input type="range" id="gapRange" min="0" max="80" step="4" value="0" />
          <span class="range-val" id="gapVal">0px</span>
        </div>
      </div>

      <div class="option-group">
        <label>间距背景色</label>
        <select id="bgSelect">
          <option value="#ffffff" selected>白色</option>
          <option value="#000000">黑色</option>
          <option value="#f5f5f5">浅灰</option>
          <option value="#1a1a1a">深灰</option>
        </select>
      </div>
    </div>

    <button class="btn" id="convertBtn" disabled>选择文件后开始转换</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">准备中...</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
      <div class="result-info">
        <div class="result-info-text">
          <strong id="resultTitle">output.png</strong>
          <span id="resultMeta">— 页 · — × — px</span>
        </div>
        <a class="download-btn" id="downloadLink" download>下载</a>
      </div>
      <button class="preview-toggle" id="previewToggle">▼ 展开预览</button>
      <div class="preview-img-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="预览" />
      </div>
    </div>
  </div>

  <script>
    const _workerCdnUrl = '../cdn/pdfjs/3.11.174/pdf.worker.min.js';
    pdfjsLib.GlobalWorkerOptions.workerSrc = _workerCdnUrl;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const scaleRange = document.getElementById('scaleRange');
    const scaleVal = document.getElementById('scaleVal');
    const gapRange = document.getElementById('gapRange');
    const gapVal = document.getElementById('gapVal');
    const formatSel = document.getElementById('formatSelect');
    const bgSel = document.getElementById('bgSelect');
    const convertBtn = document.getElementById('convertBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const errorMsg = document.getElementById('errorMsg');
    const resultEl = document.getElementById('result');
    const resultTitle = document.getElementById('resultTitle');
    const resultMeta = document.getElementById('resultMeta');
    const downloadLink = document.getElementById('downloadLink');
    const previewToggle = document.getElementById('previewToggle');
    const previewWrap = document.getElementById('previewWrap');
    const previewImg = document.getElementById('previewImg');
    const dropLabel = dropZone.querySelector('.drop-label');
    const dropHint = dropZone.querySelector('.drop-hint');

    let currentFile = null;
    let currentResultUrl = null;

    scaleRange.addEventListener('input', () => {
      scaleVal.textContent = `×${scaleRange.value}`;
    });

    gapRange.addEventListener('input', () => {
      gapVal.textContent = `${gapRange.value}px`;
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && isPdfFile(file)) setFile(file);
      else showError('请拖入单个 PDF 文件');
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    convertBtn.addEventListener('click', async () => {
      if (!currentFile) return;
      await convertPdf(currentFile);
    });

    previewToggle.addEventListener('click', () => {
      const visible = previewWrap.style.display === 'block';
      previewWrap.style.display = visible ? 'none' : 'block';
      previewToggle.textContent = visible ? '▼ 展开预览' : '▲ 收起预览';
    });

    function isPdfFile(file) {
      return file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
    }

    function setFile(file) {
      if (!isPdfFile(file)) {
        showError('仅支持 PDF 文件');
        return;
      }

      currentFile = file;
      dropLabel.innerHTML = `<strong>${escapeHtml(file.name)}</strong>`;
      dropHint.textContent = `PDF 文件 · ${(file.size / 1024 / 1024).toFixed(2)} MB`;
      convertBtn.disabled = false;
      convertBtn.textContent = '开始转换';
      hideError();
      resultEl.style.display = 'none';
    }

    async function convertPdf(file) {
      const scale = parseFloat(scaleRange.value);
      const gap = parseInt(gapRange.value, 10);
      const format = formatSel.value;
      const bg = bgSel.value;
      const quality = format === 'image/png' ? 1 : 0.92;

      convertBtn.disabled = true;
      resultEl.style.display = 'none';
      hideError();
      showProgress(0, '加载 PDF…');

      try {
        const canvases = await collectPdfCanvases(file, scale, bg);
        const result = await buildLongImage(canvases, gap, bg, format, quality);
        const ext = format.split('/')[1].replace('jpeg', 'jpg');
        const fileName = file.name.replace(/\.pdf$/i, '') + `_long.${ext}`;

        if (currentResultUrl) {
          URL.revokeObjectURL(currentResultUrl);
        }
        currentResultUrl = URL.createObjectURL(result.blob);

        showProgress(100, '完成！');

        downloadLink.href = currentResultUrl;
        downloadLink.download = fileName;
        resultTitle.textContent = fileName;
        resultMeta.textContent = `${result.count} 页 · ${result.width} × ${result.height} px · ${(result.blob.size / 1024 / 1024).toFixed(2)} MB`;

        previewImg.src = currentResultUrl;
        previewWrap.style.display = 'none';
        previewToggle.textContent = '▼ 展开预览';
        resultEl.style.display = 'block';
      } catch (err) {
        showError('转换失败：' + err.message);
        console.error(err);
      } finally {
        convertBtn.disabled = false;
        convertBtn.textContent = '重新转换';
        setTimeout(() => {
          progressWrap.style.display = 'none';
        }, 1200);
      }
    }

    async function collectPdfCanvases(file, scale, bg) {
      const arrayBuffer = await file.arrayBuffer();
      const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const totalPages = pdfDoc.numPages;
      const canvases = [];

      showProgress(5, `共 ${totalPages} 页，开始渲染…`);

      for (let i = 1; i <= totalPages; i++) {
        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        await page.render({ canvasContext: ctx, viewport }).promise;
        canvases.push(canvas);

        const pct = 5 + Math.round((i / totalPages) * 80);
        showProgress(pct, `渲染第 ${i} / ${totalPages} 页…`);
      }

      return canvases;
    }

    async function buildLongImage(canvases, gap, bg, format, quality) {
      if (!canvases.length) {
        throw new Error('没有可拼接的页面');
      }

      const maxWidth = canvases.reduce((max, canvas) => Math.max(max, canvas.width), 0);
      const totalHeight = canvases.reduce((sum, canvas, index) => {
        return sum + canvas.height + (index < canvases.length - 1 ? gap : 0);
      }, 0);

      const finalCanvas = document.createElement('canvas');
      finalCanvas.width = maxWidth;
      finalCanvas.height = totalHeight;
      const finalCtx = finalCanvas.getContext('2d');

      finalCtx.fillStyle = bg;
      finalCtx.fillRect(0, 0, maxWidth, totalHeight);

      let offsetY = 0;
      for (const canvas of canvases) {
        const x = Math.floor((maxWidth - canvas.width) / 2);
        finalCtx.drawImage(canvas, x, offsetY);
        offsetY += canvas.height + gap;
      }

      showProgress(96, '生成文件…');

      const blob = await new Promise(resolve => {
        finalCanvas.toBlob(resolve, format, quality);
      });

      if (!blob) {
        throw new Error('浏览器未能生成图片文件');
      }

      return {
        blob,
        width: maxWidth,
        height: totalHeight,
        count: canvases.length
      };
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function showProgress(pct, msg) {
      progressWrap.style.display = 'block';
      progressFill.style.width = pct + '%';
      progressText.textContent = msg;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function hideError() {
      errorMsg.style.display = 'none';
    }
  </script>
</body>
</html>
