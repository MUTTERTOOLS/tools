<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片拼接</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #eaeaea;
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .topbar {
      margin-bottom: 18px;
    }

    .back-link {
      color: #8d8d8d;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover { color: #fff; }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      color: #8b8b8b;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .workspace {
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 24px;
    }

    .workspace {
      padding: 16px;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #5a5a5a;
      background: #1f1f1f;
    }

    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone strong {
      display: block;
      font-size: 0.98rem;
      color: #fff;
      margin-bottom: 6px;
    }

    .drop-zone span {
      color: #8b8b8b;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .section {
      margin-top: 18px;
    }

    .section h2 {
      font-size: 0.92rem;
      margin-bottom: 10px;
      color: #fff;
    }

    .section p,
    .hint,
    .status,
    .error-msg {
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .hint,
    .status {
      color: #8b8b8b;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.76rem;
      color: #8b8b8b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="range"],
    select {
      width: 100%;
      background: #111;
      color: #eaeaea;
      border: 1px solid #2b2b2b;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-row input[type="range"] {
      padding: 0;
      border: none;
      accent-color: #fff;
    }

    .range-value {
      min-width: 44px;
      text-align: right;
      color: #d7d7d7;
      font-size: 0.84rem;
    }

    .zoom-actions,
    .button-row {
      display: grid;
      gap: 10px;
    }

    .zoom-actions {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 8px;
    }

    .button-row {
      grid-template-columns: 1fr 1fr;
      margin-top: 14px;
    }

    button,
    .download-btn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .primary {
      background: #fff;
      color: #000;
      font-weight: 600;
    }

    .secondary,
    .zoom-action,
    .mini-btn {
      background: #111;
      color: #fff;
      border: 1px solid #2f2f2f;
      text-decoration: none;
      text-align: center;
    }

    .danger {
      border-color: #4a2525;
      color: #ffb5b5;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .error-msg {
      margin-top: 12px;
      color: #ff7b7b;
      display: none;
    }

    .workspace-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .workspace-head h2 {
      font-size: 1rem;
      color: #fff;
    }

    .canvas-shell {
      background: #0f0f0f;
      border: 1px solid #2b2b2b;
      border-radius: 14px;
      padding: 12px;
      overflow: auto;
      height: clamp(420px, calc(100vh - 220px), 760px);
    }

    canvas {
      display: block;
      background: #fff;
      border-radius: 8px;
      max-width: 100%;
      height: auto;
      cursor: default;
    }

    .status {
      margin-top: 14px;
    }

    .thumb-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .thumb-item {
      border: 1px solid #2d2d2d;
      border-radius: 10px;
      padding: 10px 12px;
      background: #121212;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .thumb-item.active {
      border-color: #2563eb;
      background: #132033;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.22);
    }

    .thumb-item strong {
      display: block;
      color: #fff;
      font-size: 0.84rem;
      word-break: break-all;
    }

    .thumb-item span {
      color: #8b8b8b;
      font-size: 0.76rem;
    }

    .thumb-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .mini-btn {
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 0.76rem;
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .zoom-actions,
      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="back-link" href="../Index.html">← 返回工具入口</a>
    </div>

    <h1>图片拼接</h1>
    <p class="subtitle">上传多张图片，在画布中拖拽布局。拖动时图片边缘会自动吸附到其他图片边缘，导出时按当前布局的外接矩形生成结果，空白区域自动填充白色。</p>

    <section class="layout">
      <aside class="panel">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*" multiple />
          <strong>点击选择或拖拽图片</strong>
          <span>支持多张图片 · 每次重新载入当前选择的一组图片</span>
        </div>

        <div class="section controls">
          <div class="control-group">
            <label for="zoomRange">编辑缩放</label>
            <div class="range-row">
              <input type="range" id="zoomRange" min="25" max="300" step="5" value="100" />
              <span class="range-value" id="zoomValue">100%</span>
            </div>
            <div class="zoom-actions">
              <button type="button" class="zoom-action" id="fitWidthBtn">适配宽度</button>
              <button type="button" class="zoom-action" id="actualSizeBtn">100%</button>
              <button type="button" class="zoom-action" id="fitAllBtn">适配全部</button>
            </div>
          </div>

          <div class="control-group">
            <label for="snapRange">吸附阈值</label>
            <div class="range-row">
              <input type="range" id="snapRange" min="0" max="40" step="1" value="10" />
              <span class="range-value" id="snapValue">10px</span>
            </div>
          </div>

          <div class="control-group">
            <label for="gapRange">导出内边距</label>
            <div class="range-row">
              <input type="range" id="gapRange" min="0" max="80" step="2" value="0" />
              <span class="range-value" id="gapValue">0px</span>
            </div>
          </div>

          <div class="control-group">
            <label for="formatSelect">导出格式</label>
            <select id="formatSelect">
              <option value="image/png" selected>PNG（无损）</option>
              <option value="image/jpeg">JPEG（更小）</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button class="primary" id="exportBtn" disabled>下载拼接图</button>
          <button class="secondary" id="resetBtn" disabled>重置布局</button>
        </div>

        <div class="button-row">
          <button class="secondary" id="removeBtn" disabled>删除选中</button>
          <button class="secondary danger" id="clearBtn" disabled>清空全部</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="section">
          <h2>操作说明</h2>
          <p class="hint">点击图片可选中，拖拽即可移动。双击图片可置顶。编辑缩放只影响当前画布查看，不会改变导出结果。</p>
        </div>

        <div class="section">
          <h2>图片列表</h2>
          <div class="thumb-list" id="thumbList"></div>
        </div>
      </aside>

      <section class="workspace">
        <div class="workspace-head">
          <h2>编辑画布</h2>
          <span class="hint" id="canvasMeta">尚未载入图片</span>
        </div>
        <div class="canvas-shell" id="canvasShell">
          <canvas id="editorCanvas" width="860" height="620"></canvas>
        </div>
        <p class="status" id="statusText">请先上传图片。</p>
      </section>
    </section>
  </main>

  <script>
    const DEFAULT_CANVAS_WIDTH = 860;
    const DEFAULT_CANVAS_HEIGHT = 620;
    const CANVAS_PADDING = 24;
    const SCENE_LAYOUT_WIDTH = 1180;
    const MIN_ZOOM = 0.25;
    const MAX_ZOOM = 3;
    const MIN_FIT_HEIGHT = 260;
    const HANDLE_COLOR = '#3b82f6';
    const SELECT_COLOR = '#2563eb';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const zoomRange = document.getElementById('zoomRange');
    const zoomValue = document.getElementById('zoomValue');
    const fitWidthBtn = document.getElementById('fitWidthBtn');
    const actualSizeBtn = document.getElementById('actualSizeBtn');
    const fitAllBtn = document.getElementById('fitAllBtn');
    const snapRange = document.getElementById('snapRange');
    const snapValue = document.getElementById('snapValue');
    const gapRange = document.getElementById('gapRange');
    const gapValue = document.getElementById('gapValue');
    const formatSelect = document.getElementById('formatSelect');
    const exportBtn = document.getElementById('exportBtn');
    const resetBtn = document.getElementById('resetBtn');
    const removeBtn = document.getElementById('removeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const errorMsg = document.getElementById('errorMsg');
    const thumbList = document.getElementById('thumbList');
    const canvasMeta = document.getElementById('canvasMeta');
    const statusText = document.getElementById('statusText');
    const canvasShell = document.getElementById('canvasShell');
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');

    const state = {
      sourceItems: [],
      items: [],
      activeId: null,
      draggingId: null,
      dragOffsetX: 0,
      dragOffsetY: 0,
      viewScale: 1,
      viewMode: 'fit-width',
      sceneBounds: null,
      viewOffsetX: CANVAS_PADDING,
      viewOffsetY: CANVAS_PADDING,
      layoutScale: 1,
      dragViewState: null
    };

    snapRange.addEventListener('input', () => {
      snapValue.textContent = `${snapRange.value}px`;
    });

    gapRange.addEventListener('input', () => {
      gapValue.textContent = `${gapRange.value}px`;
    });

    zoomRange.addEventListener('input', () => {
      if (!state.items.length) return;
      state.viewMode = 'manual';
      const scale = Number(zoomRange.value) / 100;
      applyViewScale(scale);
      statusText.textContent = `编辑缩放已调整到 ${Math.round(scale * 100)}%。`;
    });

    fitWidthBtn.addEventListener('click', () => {
      if (!state.items.length) return;
      state.viewMode = 'fit-width';
      applyViewScale(getFitWidthScale());
      statusText.textContent = '已按宽度适配编辑视图。';
    });

    actualSizeBtn.addEventListener('click', () => {
      if (!state.items.length) return;
      state.viewMode = 'manual';
      applyViewScale(1);
      statusText.textContent = '已切换到 100% 编辑视图。';
    });

    fitAllBtn.addEventListener('click', () => {
      if (!state.items.length) return;
      state.viewMode = 'fit-all';
      applyViewScale(getFitAllScale());
      statusText.textContent = '已按整体适配编辑视图。';
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      handleFiles(fileInput.files);
    });

    exportBtn.addEventListener('click', async () => {
      await exportComposition();
    });

    resetBtn.addEventListener('click', () => {
      resetLayout();
    });

    removeBtn.addEventListener('click', () => {
      removeActiveItem();
    });

    clearBtn.addEventListener('click', () => {
      clearAllItems();
    });

    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerup', onPointerUp);
    canvas.addEventListener('pointercancel', onPointerUp);
    canvas.addEventListener('dblclick', onCanvasDoubleClick);

    window.addEventListener('resize', () => {
      if (!state.items.length) return;
      if (state.viewMode === 'fit-width') {
        applyViewScale(getFitWidthScale());
        return;
      }
      if (state.viewMode === 'fit-all') {
        applyViewScale(getFitAllScale());
      }
    });

    window.addEventListener('beforeunload', () => {
      state.dragViewState = null;
    });

    render();
    updateUiState();

    async function handleFiles(fileList) {
      hideError();
      const files = Array.from(fileList || []).filter(file => file.type.startsWith('image/'));
      if (!files.length) {
        showError('请上传至少一张图片');
        return;
      }

      try {
        const images = await Promise.all(files.map(loadImageFile));
        state.sourceItems = images.map((entry, index) => ({
          sourceId: `${Date.now()}-${index}`,
          name: entry.file.name,
          image: entry.image,
          naturalWidth: entry.image.naturalWidth || entry.image.width,
          naturalHeight: entry.image.naturalHeight || entry.image.height
        }));
        rebuildSceneItems();
        statusText.textContent = '拖拽图片可调整布局。编辑缩放只影响查看，不影响导出结果。';
      } catch (err) {
        showError(err.message);
      }
    }

    function rebuildSceneItems() {
      if (!state.sourceItems.length) {
        state.items = [];
        state.activeId = null;
        state.draggingId = null;
        state.dragViewState = null;
        state.layoutScale = 1;
        state.viewScale = 1;
        state.viewMode = 'fit-width';
        syncZoomControls(1);
        updateUiState();
        renderThumbs();
        render();
        updateMeta();
        return;
      }

      const built = buildSceneItems(state.sourceItems);
      state.layoutScale = built.layoutScale;
      state.items = built.items;
      state.activeId = state.items[state.items.length - 1]?.id ?? null;
      state.draggingId = null;
      state.dragViewState = null;
      state.viewMode = 'fit-width';
      applyViewScale(getFitWidthScale());
      renderThumbs();
      updateUiState();
    }

    function buildSceneItems(sourceItems) {
      const padding = 28;
      const gap = 20;
      const targetWidth = 240;
      const contentWidth = SCENE_LAYOUT_WIDTH - padding * 2;
      const columns = Math.max(1, Math.floor((contentWidth + gap) / (targetWidth + gap)));
      const columnWidth = Math.min(targetWidth, Math.floor((contentWidth - gap * (columns - 1)) / columns));
      const widestSource = Math.max(...sourceItems.map(item => item.naturalWidth), 1);
      const layoutScale = columnWidth / widestSource;

      let col = 0;
      let x = padding;
      let y = padding;
      let rowMaxHeight = 0;

      const items = sourceItems.map(source => {
        const placed = fitImageIntoScene(source, layoutScale, x, y);
        const item = {
          id: source.sourceId,
          name: source.name,
          image: source.image,
          naturalWidth: source.naturalWidth,
          naturalHeight: source.naturalHeight,
          width: placed.width,
          height: placed.height,
          x: placed.x,
          y: placed.y
        };

        rowMaxHeight = Math.max(rowMaxHeight, item.height);
        col += 1;

        if (col >= columns) {
          col = 0;
          x = padding;
          y += rowMaxHeight + gap;
          rowMaxHeight = 0;
        } else {
          x += columnWidth + gap;
        }

        return item;
      });

      return { items, layoutScale };
    }

    function fitImageIntoScene(source, layoutScale, x, y) {
      return {
        width: Math.max(1, Math.round(source.naturalWidth * layoutScale)),
        height: Math.max(1, Math.round(source.naturalHeight * layoutScale)),
        x,
        y
      };
    }

    function applyViewScale(scale) {
      state.viewScale = clamp(scale, MIN_ZOOM, MAX_ZOOM);
      syncZoomControls(state.viewScale);
      render();
      updateMeta();
    }

    function syncZoomControls(scale) {
      const clamped = clamp(scale, MIN_ZOOM, MAX_ZOOM);
      zoomRange.value = String(Math.round(clamped * 100));
      zoomValue.textContent = `${Math.round(clamped * 100)}%`;
    }

    function getFitWidthScale() {
      const bounds = getSceneBounds();
      if (!bounds) return 1;
      const workspaceWidth = canvasShell.clientWidth || DEFAULT_CANVAS_WIDTH;
      const availableWidth = Math.max(1, workspaceWidth - CANVAS_PADDING * 2);
      return clamp(availableWidth / bounds.width, MIN_ZOOM, MAX_ZOOM);
    }

    function getFitAllScale() {
      const bounds = getSceneBounds();
      if (!bounds) return 1;
      const workspaceWidth = canvasShell.clientWidth || DEFAULT_CANVAS_WIDTH;
      const workspaceHeight = canvasShell.clientHeight || DEFAULT_CANVAS_HEIGHT;
      const availableWidth = Math.max(1, workspaceWidth - CANVAS_PADDING * 2);
      const availableHeight = Math.max(1, Math.max(workspaceHeight, MIN_FIT_HEIGHT) - CANVAS_PADDING * 2);
      return clamp(Math.min(availableWidth / bounds.width, availableHeight / bounds.height), MIN_ZOOM, MAX_ZOOM);
    }

    function onPointerDown(event) {
      const point = getScenePoint(event);
      const item = findTopItemAt(point.x, point.y);
      if (!item) {
        state.activeId = null;
        updateUiState();
        renderThumbs();
        render();
        statusText.textContent = '未选中图片。';
        return;
      }

      state.activeId = item.id;
      bringItemToFront(item.id);
      render();
      const activeItem = getActiveItem();
      if (!activeItem) return;

      state.draggingId = activeItem.id;
      state.dragViewState = createViewSnapshot();
      state.dragOffsetX = point.x - activeItem.x;
      state.dragOffsetY = point.y - activeItem.y;
      canvas.setPointerCapture?.(event.pointerId);
      renderThumbs();
      updateUiState();
      render();
      canvas.style.cursor = 'grabbing';
      statusText.textContent = `正在拖动：${activeItem.name}`;
    }

    function onPointerMove(event) {
      if (!state.draggingId) return;
      const item = getActiveItem();
      if (!item) return;

      const point = getScenePoint(event);
      const nextX = point.x - state.dragOffsetX;
      const nextY = point.y - state.dragOffsetY;
      const activeViewScale = state.dragViewState?.viewScale || state.viewScale;
      const sceneThreshold = Number(snapRange.value) / Math.max(activeViewScale, 0.0001);
      const snapped = applySnap(item.id, nextX, nextY, item.width, item.height, sceneThreshold);
      item.x = snapped.x;
      item.y = snapped.y;
      render();
      statusText.textContent = snapped.message || `位置：${Math.round(item.x)}, ${Math.round(item.y)}`;
    }

    function onPointerUp(event) {
      if (!state.draggingId) return;
      if (event?.pointerId != null && canvas.hasPointerCapture?.(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
      state.draggingId = null;
      state.dragViewState = null;
      canvas.style.cursor = 'default';
      const item = getActiveItem();
      updateMeta();
      updateUiState();
      renderThumbs();
      statusText.textContent = item ? `已选中：${item.name}` : '未选中图片。';
      render();
    }

    function onCanvasDoubleClick(event) {
      const point = getScenePoint(event);
      const item = findTopItemAt(point.x, point.y);
      if (!item) return;
      bringItemToFront(item.id);
      state.activeId = item.id;
      updateUiState();
      renderThumbs();
      render();
      statusText.textContent = `${item.name} 已置顶。`;
    }

    function applySnap(activeId, x, y, width, height, threshold) {
      const movingEdges = {
        left: x,
        right: x + width,
        top: y,
        bottom: y + height
      };

      let snappedX = x;
      let snappedY = y;
      let bestX = threshold + 1;
      let bestY = threshold + 1;
      let message = '';

      for (const item of state.items) {
        if (item.id === activeId) continue;
        const edges = {
          left: item.x,
          right: item.x + item.width,
          top: item.y,
          bottom: item.y + item.height
        };

        const horizontalCandidates = [
          { diff: edges.left - movingEdges.left, value: edges.left },
          { diff: edges.right - movingEdges.left, value: edges.right },
          { diff: edges.left - movingEdges.right, value: edges.left - width },
          { diff: edges.right - movingEdges.right, value: edges.right - width }
        ];

        for (const candidate of horizontalCandidates) {
          const dist = Math.abs(candidate.diff);
          if (dist <= threshold && dist < bestX) {
            bestX = dist;
            snappedX = candidate.value;
            message = '已吸附到水平边缘';
          }
        }

        const verticalCandidates = [
          { diff: edges.top - movingEdges.top, value: edges.top },
          { diff: edges.bottom - movingEdges.top, value: edges.bottom },
          { diff: edges.top - movingEdges.bottom, value: edges.top - height },
          { diff: edges.bottom - movingEdges.bottom, value: edges.bottom - height }
        ];

        for (const candidate of verticalCandidates) {
          const dist = Math.abs(candidate.diff);
          if (dist <= threshold && dist < bestY) {
            bestY = dist;
            snappedY = candidate.value;
            message = message ? '已吸附到水平/垂直边缘' : '已吸附到垂直边缘';
          }
        }
      }

      return { x: snappedX, y: snappedY, message };
    }

    function getScenePoint(event) {
      const rect = canvas.getBoundingClientRect();
      const pixelX = (event.clientX - rect.left) * (canvas.width / rect.width);
      const pixelY = (event.clientY - rect.top) * (canvas.height / rect.height);
      const viewState = getActiveViewState();
      if (!viewState?.bounds) {
        return { x: pixelX, y: pixelY };
      }
      return {
        x: (pixelX - viewState.viewOffsetX) / viewState.viewScale + viewState.bounds.minX,
        y: (pixelY - viewState.viewOffsetY) / viewState.viewScale + viewState.bounds.minY
      };
    }

    function findTopItemAt(x, y) {
      for (let i = state.items.length - 1; i >= 0; i--) {
        const item = state.items[i];
        if (x >= item.x && x <= item.x + item.width && y >= item.y && y <= item.y + item.height) {
          return item;
        }
      }
      return null;
    }

    function getActiveItem() {
      return state.items.find(item => item.id === state.activeId) || null;
    }

    function bringItemToFront(id) {
      const index = state.items.findIndex(item => item.id === id);
      if (index === -1) return;
      const [item] = state.items.splice(index, 1);
      state.items.push(item);
    }

    function render() {
      const bounds = getSceneBounds();
      if (!state.dragViewState || !state.draggingId) {
        state.sceneBounds = bounds;
      }
      const viewState = getActiveViewState(bounds);

      if (!viewState?.bounds) {
        resizeCanvas(DEFAULT_CANVAS_WIDTH, DEFAULT_CANVAS_HEIGHT);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawEmptyState();
        return;
      }

      const contentWidth = Math.ceil(viewState.bounds.width * viewState.viewScale);
      const contentHeight = Math.ceil(viewState.bounds.height * viewState.viewScale);
      const nextCanvasWidth = Math.max(DEFAULT_CANVAS_WIDTH, contentWidth + CANVAS_PADDING * 2);
      const nextCanvasHeight = Math.max(DEFAULT_CANVAS_HEIGHT, contentHeight + CANVAS_PADDING * 2);
      resizeCanvas(nextCanvasWidth, nextCanvasHeight);

      if (!state.dragViewState || !state.draggingId) {
        state.viewOffsetX = Math.max(CANVAS_PADDING, Math.floor((canvas.width - contentWidth) / 2));
        state.viewOffsetY = Math.max(CANVAS_PADDING, Math.floor((canvas.height - contentHeight) / 2));
      }

      const drawState = getActiveViewState();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const item of state.items) {
        const rect = sceneToCanvasRect(item, drawState);
        ctx.drawImage(item.image, rect.x, rect.y, rect.width, rect.height);
      }

      const active = getActiveItem();
      if (active) {
        const rect = sceneToCanvasRect(active, drawState);
        ctx.save();
        ctx.strokeStyle = SELECT_COLOR;
        ctx.lineWidth = 2;
        ctx.strokeRect(rect.x - 1, rect.y - 1, rect.width + 2, rect.height + 2);
        ctx.fillStyle = HANDLE_COLOR;
        for (const point of getHandlePoints(rect)) {
          ctx.fillRect(point.x - 4, point.y - 4, 8, 8);
        }
        ctx.restore();
      }
    }

    function resizeCanvas(width, height) {
      if (canvas.width !== width) canvas.width = width;
      if (canvas.height !== height) canvas.height = height;
    }

    function sceneToCanvasRect(item, viewState = getActiveViewState()) {
      const bounds = viewState?.bounds;
      if (!bounds) {
        return {
          x: item.x,
          y: item.y,
          width: item.width,
          height: item.height
        };
      }
      return {
        x: Math.round((item.x - bounds.minX) * viewState.viewScale + viewState.viewOffsetX),
        y: Math.round((item.y - bounds.minY) * viewState.viewScale + viewState.viewOffsetY),
        width: Math.round(item.width * viewState.viewScale),
        height: Math.round(item.height * viewState.viewScale)
      };
    }

    function createViewSnapshot() {
      const bounds = state.sceneBounds ? { ...state.sceneBounds } : getSceneBounds();
      return {
        bounds,
        viewScale: state.viewScale,
        viewOffsetX: state.viewOffsetX,
        viewOffsetY: state.viewOffsetY
      };
    }

    function getActiveViewState(bounds = state.sceneBounds) {
      if (state.dragViewState && state.draggingId) {
        return state.dragViewState;
      }
      return {
        bounds,
        viewScale: state.viewScale,
        viewOffsetX: state.viewOffsetX,
        viewOffsetY: state.viewOffsetY
      };
    }

    function drawEmptyState() {
      ctx.save();
      ctx.fillStyle = '#f8f8f8';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#8b8b8b';
      ctx.font = '16px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('上传多张图片后，在这里拖拽拼接', canvas.width / 2, canvas.height / 2);
      ctx.restore();
    }

    function getHandlePoints(rect) {
      return [
        { x: rect.x, y: rect.y },
        { x: rect.x + rect.width, y: rect.y },
        { x: rect.x, y: rect.y + rect.height },
        { x: rect.x + rect.width, y: rect.y + rect.height }
      ];
    }

    async function exportComposition() {
      if (!state.items.length || !state.layoutScale) {
        showError('请先上传图片');
        return;
      }

      hideError();
      const padding = Number(gapRange.value);
      const exportBounds = getExportBounds();
      const exportWidth = Math.ceil(exportBounds.maxX - exportBounds.minX + padding * 2);
      const exportHeight = Math.ceil(exportBounds.maxY - exportBounds.minY + padding * 2);
      const exportCanvas = document.createElement('canvas');
      exportCanvas.width = exportWidth;
      exportCanvas.height = exportHeight;
      const exportCtx = exportCanvas.getContext('2d');

      exportCtx.fillStyle = '#ffffff';
      exportCtx.fillRect(0, 0, exportWidth, exportHeight);

      for (const item of state.items) {
        const exportRect = getExportRect(item, exportBounds, padding);
        exportCtx.drawImage(item.image, exportRect.x, exportRect.y, exportRect.width, exportRect.height);
      }

      const format = formatSelect.value;
      const quality = format === 'image/png' ? 1 : 0.92;
      const blob = await new Promise(resolve => exportCanvas.toBlob(resolve, format, quality));
      if (!blob) {
        showError('导出失败，浏览器未生成图片');
        return;
      }

      const ext = format.split('/')[1].replace('jpeg', 'jpg');
      triggerBlobDownload(blob, `stitched_${Date.now()}.${ext}`);
      statusText.textContent = `已下载：${exportWidth} × ${exportHeight} px。当前编辑缩放 ${Math.round(state.viewScale * 100)}% 不影响导出结果。`;
    }

    function getSceneBounds() {
      if (!state.items.length) return null;
      const bounds = state.items.reduce((acc, item) => {
        acc.minX = Math.min(acc.minX, item.x);
        acc.minY = Math.min(acc.minY, item.y);
        acc.maxX = Math.max(acc.maxX, item.x + item.width);
        acc.maxY = Math.max(acc.maxY, item.y + item.height);
        return acc;
      }, { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
      bounds.width = Math.max(1, bounds.maxX - bounds.minX);
      bounds.height = Math.max(1, bounds.maxY - bounds.minY);
      return bounds;
    }

    function getCompositionBounds() {
      const bounds = getSceneBounds();
      return bounds || { minX: 0, minY: 0, maxX: 0, maxY: 0 };
    }

    function getExportBounds() {
      if (!state.items.length || !state.layoutScale) {
        return { minX: 0, minY: 0, maxX: 0, maxY: 0 };
      }
      return state.items.reduce((acc, item) => {
        const exportWidth = item.naturalWidth;
        const exportHeight = item.naturalHeight;
        const exportX = Math.round(item.x / state.layoutScale);
        const exportY = Math.round(item.y / state.layoutScale);
        acc.minX = Math.min(acc.minX, exportX);
        acc.minY = Math.min(acc.minY, exportY);
        acc.maxX = Math.max(acc.maxX, exportX + exportWidth);
        acc.maxY = Math.max(acc.maxY, exportY + exportHeight);
        return acc;
      }, { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
    }

    function getExportRect(item, exportBounds, padding) {
      const exportX = Math.round(item.x / state.layoutScale);
      const exportY = Math.round(item.y / state.layoutScale);
      return {
        x: exportX - exportBounds.minX + padding,
        y: exportY - exportBounds.minY + padding,
        width: Math.round(item.naturalWidth),
        height: Math.round(item.naturalHeight)
      };
    }

    function renderThumbs() {
      thumbList.innerHTML = '';
      for (const item of state.items) {
        const row = document.createElement('div');
        row.className = 'thumb-item' + (item.id === state.activeId ? ' active' : '');

        const textWrap = document.createElement('div');
        const title = document.createElement('strong');
        title.textContent = item.name;
        const meta = document.createElement('span');
        meta.textContent = `${Math.round(item.width)} × ${Math.round(item.height)} · x:${Math.round(item.x)} y:${Math.round(item.y)}`;
        textWrap.append(title, meta);

        const actions = document.createElement('div');
        actions.className = 'thumb-actions';

        const selectButton = document.createElement('button');
        selectButton.className = 'mini-btn';
        selectButton.textContent = item.id === state.activeId ? '已选中' : '选中';
        selectButton.addEventListener('click', () => {
          bringItemToFront(item.id);
          state.activeId = item.id;
          updateUiState();
          renderThumbs();
          render();
          statusText.textContent = `已选中：${item.name}`;
        });

        const removeButton = document.createElement('button');
        removeButton.className = 'mini-btn danger';
        removeButton.textContent = '删除';
        removeButton.addEventListener('click', () => {
          removeItemById(item.id);
        });

        actions.append(selectButton, removeButton);
        row.append(textWrap, actions);
        thumbList.appendChild(row);
      }
    }

    function updateMeta() {
      if (!state.items.length) {
        canvasMeta.textContent = '尚未载入图片';
        return;
      }
      const bounds = getSceneBounds();
      const sceneWidth = Math.ceil(bounds.maxX - bounds.minX);
      const sceneHeight = Math.ceil(bounds.maxY - bounds.minY);
      canvasMeta.textContent = `${state.items.length} 张图片 · 场景 ${sceneWidth} × ${sceneHeight} px · 缩放 ${Math.round(state.viewScale * 100)}%`;
    }

    function updateUiState() {
      exportBtn.disabled = state.items.length === 0;
      resetBtn.disabled = state.items.length === 0;
      removeBtn.disabled = !state.activeId;
      clearBtn.disabled = state.items.length === 0;
    }

    function resetLayout() {
      if (!state.sourceItems.length) return;
      rebuildSceneItems();
      statusText.textContent = '已重置为初始布局。';
    }

    function removeActiveItem() {
      if (!state.activeId) return;
      removeItemById(state.activeId);
    }

    function removeItemById(id) {
      const index = state.items.findIndex(item => item.id === id);
      if (index === -1) return;
      const [removed] = state.items.splice(index, 1);
      state.sourceItems = state.sourceItems.filter(item => item.sourceId !== id);
      if (state.activeId === id) {
        state.activeId = state.items[state.items.length - 1]?.id ?? null;
      }
      state.draggingId = null;
      state.dragViewState = null;
      updateUiState();
      renderThumbs();
      render();
      updateMeta();
      syncZoomControls(state.items.length ? state.viewScale : 1);
      statusText.textContent = state.items.length ? `已删除：${removed.name}` : '已删除最后一张图片。';
    }

    function clearAllItems() {
      if (!state.items.length) return;
      state.sourceItems = [];
      state.items = [];
      state.activeId = null;
      state.draggingId = null;
      state.dragViewState = null;
      state.layoutScale = 1;
      state.viewScale = 1;
      state.viewMode = 'fit-width';
      syncZoomControls(1);
      updateUiState();
      renderThumbs();
      render();
      updateMeta();
      statusText.textContent = '已清空全部图片。';
    }

    function loadImageFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve({ file, image });
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error(`无法读取图片：${file.name}`));
        };
        image.src = url;
      });
    }

    function triggerBlobDownload(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }

    function hideError() {
      errorMsg.style.display = 'none';
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }
  </script>
</body>
</html>
